<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Acervo UQT — 100 anos de MPB</title>
	<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%232a2620;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%231a1814;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23grad)' width='200' height='200'/%3E%3Ccircle cx='100' cy='100' r='40' fill='none' stroke='%23d4a574' stroke-width='8'/%3E%3Ccircle cx='100' cy='100' r='15' fill='none' stroke='%23d4a574' stroke-width='2'/%3E%3Cpath d='M 100 60 Q 120 80 120 100 Q 120 125 100 140 Q 80 125 80 100 Q 80 80 100 60' fill='none' stroke='%23d4a574' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link href="uqt.css" rel="stylesheet">
	<script src="js/uqt-albums.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/umbrellajs"></script>
	<script src="js/uqt.js"></script>
</head>

<body>
	<header class="app-header">
		<div class="header-content">
			<div class="header-title">
				<h1 class="app-title">Acervo UQT</h1>
				<p class="app-subtitle">100 Anos de MPB</p>
			</div>
			<div class="music-count">705 horas de música</div>
		</div>
	</header>

	<div class="app-layout">
		<main class="main-content">
			<div class="filters-section">
				<input id="search-input" type="text" class="search-input" placeholder="Busca por artista, álbum...">
				<div class="decade-buttons" id="decade-buttons"></div>
			</div>
			<div class="albums-grid" id="albums-list"></div>
		</main>

		<aside class="tracks-panel">
			<div class="album-header" id="album-header"></div>
			<ol class="track-list" id="track-list"></ol>
		</aside>
	</div>

	<audio id="audio"></audio>

	<footer class="player-bar">
		<div id="mobile-track-drawer" class="mobile-track-drawer">
			<div class="drawer-header">
				<img id="drawer-cover" class="drawer-cover" alt="" />
				<div class="drawer-album-info">
					<div id="drawer-album-title" class="drawer-album-title"></div>
					<div id="drawer-album-meta" class="drawer-album-meta"></div>
				</div>
				<button id="drawer-close" class="drawer-close" aria-label="Fechar">✕</button>
			</div>
			<ol id="drawer-track-list" class="drawer-track-list"></ol>
		</div>

		<div class="player-content">
			<div class="now-playing-compact">
				<img id="player-cover" class="player-cover" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%232a2620;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%231a1814;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23grad)' width='200' height='200'/%3E%3Ccircle cx='100' cy='100' r='40' fill='none' stroke='%23d4a574' stroke-width='8'/%3E%3Ccircle cx='100' cy='100' r='15' fill='none' stroke='%23d4a574' stroke-width='2'/%3E%3Cpath d='M 100 60 Q 120 80 120 100 Q 120 125 100 140 Q 80 125 80 100 Q 80 80 100 60' fill='none' stroke='%23d4a574' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" alt="">
				<div class="player-info">
					<h3 id="player-title">Selecione uma música</h3>
					<p id="player-artist"></p>
				</div>
			</div>

			<div class="player-controls">
				<div class="controls-buttons">
					<button id="btn-prev" class="btn btn-control" title="Anterior">⏮</button>
					<button id="btn-play" class="btn btn-play" title="Play">▶</button>
					<button id="btn-next" class="btn btn-control" title="Próxima">⏭</button>
					<button id="btn-tracklist" class="btn btn-tracklist mobile-only" title="Faixas">☰</button>
				</div>
				<div class="progress-container">
					<span id="time-current" class="time">0:00</span>
					<div class="progress-bar">
						<div id="progress-fill" class="progress-fill"></div>
					</div>
					<span id="time-duration" class="time">0:00</span>
				</div>
			</div>

			<div class="library-stats">
				<span id="stat-albums">0 álbuns</span>
				<span id="stat-artists">0 artistas</span>
			</div>
		</div>
	</footer>
</body>
</html>
