<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>UQT Data Viewer — Album Library</title>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
	<style>
		:root {
			--color-bg: #0f0e0c;
			--color-surface: #1a1814;
			--color-surface-light: #2a2620;
			--color-accent: #d4a574;
			--color-text: #f5f1ed;
			--color-text-secondary: #b8b0a8;
			--color-text-muted: #7a7268;
			--color-border: #3a3530;
			--font-display: 'Playfair Display', serif;
			--font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background-color: var(--color-bg);
			color: var(--color-text);
			font-family: var(--font-body);
			font-size: 14px;
			line-height: 1.6;
			min-height: 100vh;
		}

		.container {
			max-width: 1600px;
			margin: 0 auto;
			padding: 2rem;
		}

		header {
			background: linear-gradient(135deg, #1a1814 0%, #252019 100%);
			border-bottom: 2px solid var(--color-accent);
			padding: 2rem;
			margin-bottom: 2rem;
			border-radius: 8px;
		}

		h1 {
			font-family: var(--font-display);
			font-size: 2.2rem;
			color: var(--color-accent);
			margin-bottom: 0.5rem;
		}

		.header-info {
			display: flex;
			gap: 2rem;
			font-size: 0.95rem;
			color: var(--color-text-secondary);
		}

		.stats {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
			gap: 1rem;
			margin-bottom: 2rem;
		}

		.stat-card {
			background: var(--color-surface);
			border: 1px solid var(--color-border);
			border-radius: 8px;
			padding: 1.5rem;
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
		}

		.stat-label {
			font-size: 0.8rem;
			color: var(--color-text-muted);
			text-transform: uppercase;
			letter-spacing: 1px;
		}

		.stat-value {
			font-size: 2rem;
			font-weight: 700;
			color: var(--color-accent);
		}

		.filters {
			display: flex;
			gap: 1rem;
			margin-bottom: 2rem;
			flex-wrap: wrap;
		}

		input[type="text"] {
			padding: 0.75rem 1rem;
			background: var(--color-surface-light);
			border: 1px solid var(--color-border);
			border-radius: 6px;
			color: var(--color-text);
			font-family: var(--font-body);
			flex: 1;
			min-width: 250px;
		}

		input[type="text"]:focus {
			outline: none;
			border-color: var(--color-accent);
			box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
			gap: 1.5rem;
		}

		.album-card {
			background: var(--color-surface);
			border: 1px solid var(--color-border);
			border-radius: 8px;
			overflow: hidden;
			transition: all 0.3s ease;
			cursor: pointer;
		}

		.album-card:hover {
			border-color: var(--color-accent);
			transform: translateY(-4px);
			box-shadow: 0 8px 24px rgba(212, 165, 116, 0.2);
		}

		.album-cover {
			width: 100%;
			aspect-ratio: 1;
			object-fit: cover;
			background: var(--color-surface-light);
		}

		.album-cover.placeholder {
			object-fit: contain;
			padding: 20px;
		}

		.album-info {
			padding: 1rem;
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
		}

		.album-title {
			font-weight: 600;
			color: var(--color-text);
			font-size: 0.9rem;
			line-height: 1.3;
		}

		.album-meta {
			font-size: 0.75rem;
			color: var(--color-text-muted);
			display: flex;
			flex-direction: column;
			gap: 2px;
		}

		.album-artists {
			color: var(--color-text-secondary);
		}

		.album-year {
			color: var(--color-accent);
			font-weight: 600;
		}

		.album-tracks {
			font-size: 0.7rem;
			color: var(--color-text-muted);
		}

		.empty {
			grid-column: 1 / -1;
			text-align: center;
			padding: 3rem;
			color: var(--color-text-muted);
		}

		.modal {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: rgba(0, 0, 0, 0.8);
			z-index: 1000;
			align-items: center;
			justify-content: center;
			padding: 1rem;
		}

		.modal.active {
			display: flex;
		}

		.modal-content {
			background: var(--color-surface);
			border: 1px solid var(--color-border);
			border-radius: 12px;
			max-width: 800px;
			max-height: 90vh;
			overflow-y: auto;
			padding: 2rem;
			position: relative;
		}

		.modal-close {
			position: absolute;
			top: 1rem;
			right: 1rem;
			background: none;
			border: none;
			color: var(--color-accent);
			font-size: 1.5rem;
			cursor: pointer;
		}

		.modal-album {
			display: flex;
			gap: 2rem;
			margin-bottom: 2rem;
		}

		.modal-cover {
			width: 200px;
			height: 200px;
			object-fit: cover;
			border-radius: 8px;
			background: var(--color-surface-light);
			flex-shrink: 0;
		}

		.modal-cover.placeholder {
			object-fit: contain;
			padding: 20px;
		}

		.modal-details {
			flex: 1;
		}

		.modal-details h2 {
			font-family: var(--font-display);
			font-size: 1.8rem;
			color: var(--color-accent);
			margin-bottom: 0.5rem;
		}

		.modal-details p {
			color: var(--color-text-secondary);
			margin-bottom: 0.5rem;
		}

		.modal-tracks {
			margin-top: 1.5rem;
		}

		.modal-tracks h3 {
			font-size: 1rem;
			margin-bottom: 1rem;
			color: var(--color-text);
		}

		.track-list {
			list-style: none;
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			max-height: 400px;
			overflow-y: auto;
		}

		.track-item {
			padding: 0.5rem;
			background: var(--color-surface-light);
			border-radius: 4px;
			font-size: 0.85rem;
			color: var(--color-text-secondary);
		}

		.loading-overlay {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: rgba(15, 14, 12, 0.95);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 2000;
			transition: opacity 0.5s ease;
		}

		.loading-overlay.hidden {
			opacity: 0;
			pointer-events: none;
		}

		.spinner {
			position: relative;
			width: 120px;
			height: 120px;
		}

		.spinner-ring {
			box-sizing: border-box;
			position: absolute;
			width: 100%;
			height: 100%;
			border: 4px solid transparent;
			border-top-color: var(--color-accent);
			border-right-color: var(--color-accent);
			border-radius: 50%;
			animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
		}

		.spinner-ring:nth-child(1) {
			animation-delay: -0.45s;
		}

		.spinner-ring:nth-child(2) {
			animation-delay: -0.3s;
		}

		.spinner-ring:nth-child(3) {
			animation-delay: -0.15s;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}
			100% {
				transform: rotate(360deg);
			}
		}

		.loading-text {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, calc(-50% + 80px));
			text-align: center;
			font-family: var(--font-display);
			font-size: 1.2rem;
			color: var(--color-accent);
			letter-spacing: 1px;
		}

		.loading-dots {
			display: inline-block;
			animation: dots 1.5s steps(4, end) infinite;
		}

		@keyframes dots {
			0%, 20% {
				content: '.';
			}
			40% {
				content: '..';
			}
			60% {
				content: '...';
			}
			80%, 100% {
				content: '';
			}
		}

		@media (max-width: 768px) {
			.container {
				padding: 1rem;
			}

			header {
				padding: 1.5rem;
			}

			h1 {
				font-size: 1.6rem;
			}

			.grid {
				grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
				gap: 1rem;
			}

			.modal-album {
				flex-direction: column;
				align-items: center;
			}

			.modal-cover {
				width: 150px;
				height: 150px;
			}

			.spinner {
				width: 80px;
				height: 80px;
			}

			.spinner-ring {
				border-width: 3px;
			}

			.loading-text {
				font-size: 1rem;
				transform: translate(-50%, calc(-50% + 60px));
			}
		}
	</style>
</head>
<body>
	<div class="loading-overlay" id="loading">
		<div>
			<div class="spinner">
				<div class="spinner-ring"></div>
				<div class="spinner-ring"></div>
				<div class="spinner-ring"></div>
				<div class="spinner-ring"></div>
			</div>
			<div class="loading-text">Carregando<span class="loading-dots"></span></div>
		</div>
	</div>

	<div class="container">
		<header>
			<h1>UQT Album Library</h1>
			<div class="header-info">
				<div>100 Anos de MPB</div>
				<div>Proxy: <code style="color: var(--color-accent);">http://xn--2dk.xyz:9001/uqt</code></div>
			</div>
		</header>

		<div class="stats" id="stats"></div>

		<div class="filters">
			<input type="text" id="search" placeholder="Buscar por artista, álbum...">
		</div>

		<div class="grid" id="grid"></div>

		<div class="modal" id="modal">
			<div class="modal-content">
				<button class="modal-close" onclick="closeModal()">&times;</button>
				<div id="modal-body"></div>
			</div>
		</div>
	</div>

	<script src="js/uqt.json"></script>
	<script>
		let albums = [];
		let allAlbums = [];
		const BASE_URL = 'http://xn--2dk.xyz:9001/uqt';
		const PLACEHOLDER_COVER = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Cdefs%3E%3ClinearGradient id="grad" x1="0%25" y1="0%25" x2="100%25" y2="100%25"%3E%3Cstop offset="0%25" style="stop-color:%232a2620;stop-opacity:1" /%3E%3Cstop offset="100%25" style="stop-color:%231a1814;stop-opacity:1" /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill="url(%23grad)" width="200" height="200"/%3E%3Ccircle cx="100" cy="100" r="40" fill="none" stroke="%23d4a574" stroke-width="8"/%3E%3Ccircle cx="100" cy="100" r="15" fill="none" stroke="%23d4a574" stroke-width="2"/%3E%3Cpath d="M 100 60 Q 120 80 120 100 Q 120 125 100 140 Q 80 125 80 100 Q 80 80 100 60" fill="none" stroke="%23d4a574" stroke-width="3" stroke-linecap="round"/%3E%3C/svg%3E';

		function groupAlbums() {
			const albumMap = {};

			db.tracks.forEach(track => {
				const folder = track.file.split('/')[1];
				const albumKey = track.album;

				if (!albumMap[albumKey]) {
					albumMap[albumKey] = {
						name: track.album,
						artists: track.artists,
						year: track.year,
						cover: `${BASE_URL}/${folder}/capa.jpg`,
						tracks: []
					};
				}

				albumMap[albumKey].tracks.push(track);
			});

			allAlbums = Object.values(albumMap).sort((a, b) => b.year - a.year);
			albums = [...allAlbums];
			render();
			updateStats();
		}

		function updateStats() {
			const totalTracks = db.tracks.length;
			const totalYears = new Set(db.tracks.map(t => t.year)).size;
			const totalArtists = new Set(db.tracks.map(t => t.artists)).size;

			document.getElementById('stats').innerHTML = `
				<div class="stat-card">
					<div class="stat-label">Total Albums</div>
					<div class="stat-value">${allAlbums.length}</div>
				</div>
				<div class="stat-card">
					<div class="stat-label">Total Tracks</div>
					<div class="stat-value">${totalTracks}</div>
				</div>
				<div class="stat-card">
					<div class="stat-label">Total Artists</div>
					<div class="stat-value">${totalArtists}</div>
				</div>
				<div class="stat-card">
					<div class="stat-label">Years Covered</div>
					<div class="stat-value">${totalYears}</div>
				</div>
			`;
		}

		function render() {
			const grid = document.getElementById('grid');

			if (albums.length === 0) {
				grid.innerHTML = '<div class="empty">No albums found</div>';
				return;
			}

			grid.innerHTML = albums.map(album => `
				<div class="album-card" onclick="openModal(${JSON.stringify(album).replace(/"/g, '&quot;')})">
					<img class="album-cover" src="${album.cover}" alt="${album.name}" onerror="this.src='${PLACEHOLDER_COVER}'; this.classList.add('placeholder');">
					<div class="album-info">
						<div class="album-title">${album.name}</div>
						<div class="album-meta">
							<div class="album-artists">${album.artists}</div>
							<div class="album-year">${album.year}</div>
							<div class="album-tracks">${album.tracks.length} tracks</div>
						</div>
					</div>
				</div>
			`).join('');
		}

		function openModal(album) {
			const body = document.getElementById('modal-body');
			body.innerHTML = `
				<div class="modal-album">
					<img class="modal-cover" src="${album.cover}" alt="${album.name}" onerror="this.src='${PLACEHOLDER_COVER}'; this.classList.add('placeholder');">
					<div class="modal-details">
						<h2>${album.name}</h2>
						<p><strong>Artists:</strong> ${album.artists}</p>
						<p><strong>Year:</strong> ${album.year}</p>
						<p><strong>Tracks:</strong> ${album.tracks.length}</p>
						<div class="modal-tracks">
							<h3>Tracklist</h3>
							<ol class="track-list">
								${album.tracks.map(track => `<li class="track-item">${track.num}. ${track.title}</li>`).join('')}
							</ol>
						</div>
					</div>
				</div>
			`;
			document.getElementById('modal').classList.add('active');
		}

		function closeModal() {
			document.getElementById('modal').classList.remove('active');
		}

		document.getElementById('search').addEventListener('input', (e) => {
			const query = e.target.value.toLowerCase();
			albums = allAlbums.filter(album =>
				album.name.toLowerCase().includes(query) ||
				album.artists.toLowerCase().includes(query)
			);
			render();
		});

		document.getElementById('modal').addEventListener('click', (e) => {
			if (e.target.id === 'modal') closeModal();
		});

		// Load data and hide loading overlay
		setTimeout(() => {
			groupAlbums();
			document.getElementById('loading').classList.add('hidden');
		}, 300);
	</script>
</body>
</html>
